name: Metrics
on: [workflow_dispatch]
jobs:
  metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          user: afiqnazir
          filename: github-metrics.svg
          plugin_languages: yes
          plugin_habits: yes
          plugin_isocalendar: yes
